name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-analyze:
    name: Test and analyze
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild \
            -project LocalScribe.xcodeproj \
            -scheme LocalScribe \
            -configuration Debug \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/LocalScribe-Debug" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Analyze release build
        run: |
          set -o pipefail
          xcodebuild \
            -project LocalScribe.xcodeproj \
            -scheme LocalScribe \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -derivedDataPath "$RUNNER_TEMP/LocalScribe-Release" \
            CODE_SIGNING_ALLOWED=NO \
            analyze
