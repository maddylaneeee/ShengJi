name: Feature request
description: Suggest a focused improvement to LocalScribe.
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user problem rather than only the proposed implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Transcription accuracy
        - Live captions
        - Translation
        - Performance or memory
        - Import, editing, or export
        - Packaging or updates
        - Accessibility or interface
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for a similar request.
          required: true
